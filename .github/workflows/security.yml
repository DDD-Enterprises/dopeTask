name: Security

on:
  push:
    branches: ["main", "develop"]
    tags: ["v*"]
  pull_request:
    branches: ["main", "develop"]

permissions:
  contents: read

jobs:
  dependency-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Export frozen requirements
        run: uv export --frozen --format requirements-txt --no-hashes > requirements-ci.txt

      - name: Filter local project from audit requirements
        run: grep -vE "^-e \." requirements-ci.txt > requirements-audit.txt || true

      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit

      - name: Run strict vulnerability audit
        run: |
          # As of 2026-03-26, PyPI still serves pygments 2.19.2 as the latest
          # release and pip-audit reports CVE-2026-4539 without a fix version.
          # Keep this exception narrow and remove it once upstream ships a fix.
          pip-audit --strict --ignore-vuln CVE-2026-4539 -r requirements-audit.txt
